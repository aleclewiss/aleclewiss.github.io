<html lang="en">
<head>

  <meta name="description" content="The desk of Alec Lewis — a usable desktop of everything he's built: an AI mixing plugin, a music generator, an automated channel, and the life outside it.">

  <link rel="canonical" href="https://aleclewiss.github.io/">
  <meta property="og:title" content="Alec Lewis">
  <meta property="og:description" content="Everything I've built, on the machine I built it on. Look around.">

  <meta property="og:type" content="website">
  <meta property="og:image" content="https://aleclewiss.github.io/assets/og.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">

  <link rel="stylesheet" href="os/mobile.css?v=45">

  <!-- P5: pull the two known-critical, every-visit assets onto the critical path. The
       wallpaper lives only inside CSS (--wall) so it's otherwise discovered late; the hero
       photo is built by JS. Desktop shows the 1280px JPEG, mobile the 720px WebP — preload
       the one each viewport actually uses so neither downloads a variant it won't show. -->
  <link rel="preload" as="image" href="assets/wallpaper.jpg">
  <link rel="preload" as="image" href="assets/personal/gf-and-me.jpg" media="(min-width: 861px)" fetchpriority="high">
  <link rel="preload" as="image" href="assets/personal/720/gf-and-me.webp" media="(max-width: 860px)" fetchpriority="high">
</head>
<body>
  <noscript>
    <div style="max-width:40rem;margin:12vh auto;padding:0 1.5rem;font-family:system-ui,sans-serif;color:#F2F0F5;background:#08080B">
      <h1 style="font-size:2.4rem;letter-spacing:-.03em">Alec Lewis</h1>
      <p style="color:#9A94A0;line-height:1.6">I build audio software and automation in State College, PA — an AI mixing plugin (Freak-Quencies),
      a music generator (Backline), and an automated video channel (Aminal House). This site is an
      interactive desktop; it needs JavaScript. Reach me at
      <a href="mailto:aleclewis@psu.edu" style="color:#ecc270">aleclewis@psu.edu</a> or on
      <a href="https://github.com/aleclewiss" style="color:#ecc270">GitHub</a>.</p>
    </div>
  </noscript>

  <!-- The window manager builds the desktop into this root. -->
  <a class="alt-view" href="signalpath.html" style="position:fixed;right:14px;bottom:10px;z-index:70;font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9A94A0;text-decoration:none;padding:.5rem .8rem;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(12,12,16,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)">Signal Path &#8599;</a>
  <div id="alecos" aria-label="Alec Lewis — interactive desktop"></div>

  <!-- Motion (motion.dev) — springs the scroll snap with real physics. Vendored locally
       (P4: was cdn.jsdelivr.net) so there's no cross-origin DNS/TLS or third-party dependency.
       Loaded as a module so it never blocks; wm.js feature-detects window.Motion and falls
       back to the browser's native smooth scroll if this fails to load. -->
  <script type="module">
    try { window.Motion = await import("./os/vendor/motion.js?v=45"); }
    catch (e) { /* offline / blocked → wm.js uses its built-in fallback */ }
  </script>
  <!-- anime.js — playful, on-brand motion touches (dock stagger-in on wake, macOS-style
       dock bounce on app change). Vendored locally; feature-detected; site works without it. -->
  <script type="module">
    try { window.anime = await import("./os/vendor/anime.js?v=45"); }
    catch (e) { /* offline / blocked → touches are simply skipped */ }
  </script>

  <!-- Window manager first (defines window.AlecOS), then the apps register themselves. -->
  <script src="os/wm.js?v=45" defer></script>
  <script src="os/app-freak.js?v=45" defer></script>
  <script src="os/app-backline.js?v=45" defer></script>
  <script src="os/app-media.js?v=45" defer></script>
  <script defer>
    // All deferred scripts run in order; boot once the last one (this) is reached.
    document.addEventListener("DOMContentLoaded", function () {
      if (window.AlecOS && typeof window.AlecOS.boot === "function") window.AlecOS.boot();
    });
  </script>

  <!-- P6: service worker for near-instant repeat visits. Registered after load so it never
       competes with the first paint. skipWaiting + clients.claim in sw.js make a version bump
       take effect on the next navigation; old caches are evicted on activate. -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js?v=45").catch(function () { /* SW optional — site works without it */ });
      });
    }
  </script>
</body>
</html>
